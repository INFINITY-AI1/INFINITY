      <input type="text" class="search-box" id="searchInput" placeholder="🔍 بحث بالاسم أو الرقم...">
      <select class="filter-select" id="gradeFilter">
        <option value="all">كل المراحل</option>
        <option value="الصف الرابع">رابع</option>
        <option value="الصف الخامس">خامس</option>
        <option value="الصف السادس">سادس</option>
        <option value="الأول الإعدادي">أول إعدادي</option>
        <option value="الثاني الإعدادي">ثاني إعدادي</option>
        <option value="الثالث الإعدادي">ثالث إعدادي</option>
        <option value="الأول الثانوي">أول ثانوي</option>
        <option value="الثاني الثانوي">ثاني ثانوي</option>
      </select>
    </div>

    <!-- تبويبات -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="all">الكل <span class="tab-badge" id="badgeAll">0</span></button>

      <span class="live-badge"><span class="live-dot"></span>مباشر</span>
    </div>

    <!-- محتوى التبويبات -->
    <div class="tab-content active" id="tab-all"><div class="requests-list" id="listAll"></div></div>
    <div class="tab-content" id="tab-new"><div class="requests-list" id="listNew"></div></div>
    <div class="tab-content" id="tab-read"><div class="requests-list" id="listRead"></div></div>
    <div class="tab-content" id="tab-withCourses"><div class="requests-list" id="listCourses"></div></div>
    <div class="tab-content" id="tab-visitors"><div class="requests-list" id="listVisitors"></div></div>

  <script>
    (function() {
      window.addEventListener('load', function() {
        if (!window.db) { setTimeout(initDashboard, 600); return; }
        initDashboard();
      });

      function initDashboard() {
        const db = window.db;
        const col = window.collection;
        const q = window.query;
        const order = window.orderBy;
        const onSnap = window.onSnapshot;
        const delDoc = window.deleteDoc;
        const docR = window.doc;
        const updDoc = window.updateDoc;
        const sTime = window.serverTimestamp;
        const getD = window.getDoc;
        const setD = window.setDoc;
        const inc = window.increment;
        const lim = window.limit;

        // عناصر الواجهة
        const els = {
          statVisitors: document.getElementById('statVisitors'),
          statTotal: document.getElementById('statTotal'),
          statNew: document.getElementById('statNew'),
          statToday: document.getElementById('statToday'),
          badgeAll: document.getElementById('badgeAll'),
          badgeNew: document.getElementById('badgeNew'),
          lastUpdate: document.getElementById('lastUpdate'),
          searchInput: document.getElementById('searchInput'),
          gradeFilter: document.getElementById('gradeFilter'),
          listAll: document.getElementById('listAll'),
          listNew: document.getElementById('listNew'),
          listRead: document.getElementById('listRead'),
          listCourses: document.getElementById('listCourses'),
          listVisitors: document.getElementById('listVisitors'),
          modal: document.getElementById('deleteModal'),
          modalName: document.getElementById('modalStudentName'),
          cancelBtn: document.getElementById('cancelBtn'),
          confirmBtn: document.getElementById('confirmBtn'),
        };

        let activeTab = 'all';
        let allRequests = [];
        let allVisitors = [];
        let deleteTargetId = null;
        let searchTerm = '';
        let gradeFilter = 'all';

        const STATS_DOC = docR(db, "statistics_ismail_emad", "counters");

        // تحميل الإحصائيات
        async function loadStats() {
          try {
            const snap = await getD(STATS_DOC);
            if (snap.exists()) {
              const data = snap.data();
              const today = new Date().toDateString();
              
              if (data.lastTodayReset !== today) {
                await setD(STATS_DOC, {
                  totalVisitors: data.totalVisitors || 0,
                  totalSubmissions: data.totalSubmissions || 0,
                  newSubmissions: data.newSubmissions || 0,
                  todaySubmissions: 0,
                  lastTodayReset: today,
                  updatedAt: sTime()
                }, { merge: true });
                data.todaySubmissions = 0;
              }

              els.statVisitors.textContent = data.totalVisitors || 0;
              els.statTotal.textContent = data.totalSubmissions || 0;
              els.statNew.textContent = data.newSubmissions || 0;
              els.statToday.textContent = data.todaySubmissions || 0;
            }
          } catch (e) { console.error('خطأ الإحصائيات:', e); }
        }

        // تبويبات
        document.querySelectorAll('.tab-btn').forEach(btn => {
          btn.addEventListener('click', function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            activeTab = this.dataset.tab;
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.getElementById(`tab-${activeTab}`).classList.add('active');
          });
        });

        // بحث وفلترة
        els.searchInput.addEventListener('input', function() {
          searchTerm = this.value.toLowerCase();
          renderAll();
        });

        els.gradeFilter.addEventListener('change', function() {
          gradeFilter = this.value;
          renderAll();
        });

        function filterReqs(requests) {
          return requests.filter(req => {
            const nameMatch = !searchTerm || 
              (req.studentName && req.studentName.toLowerCase().includes(searchTerm)) ||
              (req.phoneNumber && req.phoneNumber.includes(searchTerm));
            const gradeMatch = gradeFilter === 'all' || req.gradeLevel === gradeFilter;
            return nameMatch && gradeMatch;
          });
        }

        // استماع للتسجيلات
        const surveyCol = col(db, "survey_ismail_emad");
        const surveyQuery = q(surveyCol, order("submittedAt", "desc"), lim(100));

        onSnap(surveyQuery, (snapshot) => {
          const requests = [];
          snapshot.forEach((doc) => {
            requests.push({ id: doc.id, ...doc.data() });
          });
          allRequests = requests;

          const newReqs = requests.filter(r => !r.read);
          const withCourses = requests.filter(r => r.selectedCourses && r.selectedCourses.length > 0);
          
          els.badgeAll.textContent = requests.length;
          els.badgeNew.textContent = newReqs.length;

          loadStats();
          renderAll();
          updateTime();
        }, (error) => {
          console.error("خطأ في جلب التسجيلات:", error);
        });

        // استماع للزوار
        const visCol = col(db, "visitors_ismail_emad");
        const visQuery = q(visCol, order("visitedAt", "desc"), lim(50));

        onSnap(visQuery, (snapshot) => {
          const visitors = [];
          snapshot.forEach((doc) => {
            visitors.push({ id: doc.id, ...doc.data() });
          });
          allVisitors = visitors;
          renderVisitors();
        }, (error) => {
          console.error("خطأ في جلب الزوار:", error);
        });

        function updateTime() {
          els.lastUpdate.textContent = new Date().toLocaleTimeString('ar-EG', { 
            hour: '2-digit', minute: '2-digit', second: '2-digit' 
          });
        }

        function renderAll() {
          const newReqs = allRequests.filter(r => !r.read);
          const readReqs = allRequests.filter(r => r.read);
          const withCourses = allRequests.filter(r => r.selectedCourses && r.selectedCourses.length > 0);

          renderList(els.listAll, allRequests);
          renderList(els.listNew, newReqs);
          renderList(els.listRead, readReqs);
          renderList(els.listCourses, withCourses);
        }

        function renderList(container, requests) {
          const filtered = filterReqs(requests);
          
          if (filtered.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">📋</div><p>لا توجد طلبات</p></div>`;
            return;
          }

          container.innerHTML = filtered.map((req, i) => {
            const isNew = !req.read;
            let timeDisplay = 'غير محدد';
            if (req.submittedAt) {
              const d = req.submittedAt.toDate ? req.submittedAt.toDate() : new Date(req.submittedAt);
              timeDisplay = d.toLocaleDateString('ar-EG', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
            }
            const phone = req.phoneNumber || '';
            const programs = req.selectedPrograms || [];
            const courses = req.selectedCourses || [];
            const courseNames = {
              'course1': 'علوم',
              'course2': 'برمجة',
              'course3': 'علوم متكاملة',
              'course4': 'كيمياء',
              'course5': 'فيزياء'
            };

            return `
              <div class="request-card ${isNew ? 'new-highlight' : 'read-highlight'}" style="animation-delay:${i*0.02}s">
                <div class="card-header">
                  <span class="student-name">${req.studentName || 'غير محدد'}</span>
                  <span class="card-time">${timeDisplay}</span>
                </div>
                <div class="card-details">
                  <div class="detail-row">
                    <span class="detail-label">📞</span>
                    <span class="detail-value" dir="ltr">${phone}</span>
                  </div>
                  <div class="detail-row">
                    <span class="detail-label">🎒</span>
                    <span class="detail-value">${req.gradeLevel || 'غير محدد'}</span>
                  </div>
                  <div>
                    <span class="badge ${isNew ? 'badge-new' : 'badge-read'}">${isNew ? '🆕 جديد' : '✅ مقروء'}</span>
                    ${courses.length > 0 ? courses.map(c => `<span class="badge badge-course">📚 ${courseNames[c] || c}</span>`).join('') : ''}
                  </div>
                  ${programs.length > 0 ? `
                    <div class="programs-tags">
                      ${programs.slice(0, 3).map(p => `<span class="program-tag">💻 ${p}</span>`).join('')}
                      ${programs.length > 3 ? `<span class="program-tag">+${programs.length - 3}</span>` : ''}
                    </div>
                  ` : ''}
                  ${req.answer1 ? `
                    <div style="font-size:11px;color:#6c757d;margin-top:4px;">
                      <strong>س1:</strong> ${req.answer1.substring(0, 80)}${req.answer1.length > 80 ? '...' : ''}
                    </div>
                  ` : ''}
                  ${req.answer2 ? `
                    <div style="font-size:11px;color:#6c757d;">
                      <strong>س2:</strong> ${req.answer2.substring(0, 80)}${req.answer2.length > 80 ? '...' : ''}
                    </div>
                  ` : ''}
                </div>
                <div class="card-actions">
                  ${phone ? `
                    <button class="btn-action btn-wa" data-wa="${phone}">💬 واتساب</button>
                    <button class="btn-action btn-copy" data-copy="${phone}">📋 نسخ</button>
                  ` : ''}
                  <button class="btn-action btn-toggle" data-id="${req.id}" data-read="${isNew ? 'mark' : 'unmark'}">
                    ${isNew ? '✅ مقروء' : '🔄 غير مقروء'}
                  </button>
                  <button class="btn-action btn-del" data-id="${req.id}" data-name="${req.studentName || 'غير محدد'}">🗑️ حذف</button>
                </div>
              </div>
            `;
          }).join('');

          attachEvents(container);
        }

        function attachEvents(container) {
          container.querySelectorAll('.btn-wa').forEach(b => {
            b.addEventListener('click', (e) => {
              e.stopPropagation();
              window.open(`https://wa.me/2${b.dataset.wa.replace(/^0/, '')}`, '_blank');
            });
          });
          container.querySelectorAll('.btn-copy').forEach(b => {
            b.addEventListener('click', (e) => {
              e.stopPropagation();
              navigator.clipboard.writeText(b.dataset.copy).then(() => alert('📋 تم النسخ!'));
            });
          });
          container.querySelectorAll('.btn-toggle').forEach(b => {
            b.addEventListener('click', async (e) => {
              e.stopPropagation();
              const id = b.dataset.id;
              const read = b.dataset.read === 'mark';
              try {
                await updDoc(docR(db, "survey_ismail_emad", id), { read });
                if (read) {
                  await setD(STATS_DOC, { newSubmissions: inc(-1) }, { merge: true });
                } else {
                  await setD(STATS_DOC, { newSubmissions: inc(1) }, { merge: true });
                }
              } catch (err) { console.error(err); }
            });
          });
          container.querySelectorAll('.btn-del').forEach(b => {
            b.addEventListener('click', (e) => {
              e.stopPropagation();
              deleteTargetId = b.dataset.id;
              els.modalName.textContent = b.dataset.name;
              els.modal.classList.add('active');
              els.confirmBtn.disabled = false;
              els.confirmBtn.textContent = 'حذف';
            });
          });
        }

        function renderVisitors() {
          const container = els.listVisitors;
          if (allVisitors.length === 0) {
            container.innerHTML = `<div class="empty-state"><div class="icon">👁️</div><p>لا توجد زيارات</p></div>`;
            return;
          }

          const today = new Date().toDateString();
          const todayVisitors = allVisitors.filter(v => {
            if (!v.visitedAt) return false;
            const d = v.visitedAt.toDate ? v.visitedAt.toDate() : new Date(v.visitedAt);
            return d.toDateString() === today;
          });

          container.innerHTML = `
            <div class="visitor-summary-card">
              <div class="visitor-big-num">${allVisitors.length}</div>
              <div style="font-size:12px;color:#6c757d;font-weight:600;">إجمالي الزوار</div>
              <div class="visitor-detail-row">
                <div><div style="font-weight:800;font-size:16px;">${todayVisitors.length}</div><div style="font-size:10px;color:#6c757d;">اليوم</div></div>
                <div><div style="font-weight:800;font-size:16px;">${allRequests.length}</div><div style="font-size:10px;color:#6c757d;">استبيان</div></div>
                <div><div style="font-weight:800;font-size:16px;">${allVisitors.length > 0 ? Math.round((allRequests.length / allVisitors.length) * 100) : 0}%</div><div style="font-size:10px;color:#6c757d;">تحويل</div></div>
              </div>
            </div>
            <div style="font-weight:700;font-size:13px;margin-bottom:8px;">آخر الزيارات</div>
            ${allVisitors.slice(0, 20).map((v, i) => {
              let t = 'غير محدد';
              if (v.visitedAt) {
                const d = v.visitedAt.toDate ? v.visitedAt.toDate() : new Date(v.visitedAt);
                t = d.toLocaleDateString('ar-EG', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
              }
              return `<div class="visitor-entry"><span>👤 زائر ${allVisitors.length - i}</span><span style="color:#adb5bd;font-size:11px;">${t}</span></div>`;
            }).join('')}
          `;
        }

        // مودال الحذف
        els.cancelBtn.addEventListener('click', () => {
          els.modal.classList.remove('active');
          deleteTargetId = null;
        });

        els.modal.addEventListener('click', (e) => {
          if (e.target === els.modal) {
            els.modal.classList.remove('active');
            deleteTargetId = null;
          }
        });

        els.confirmBtn.addEventListener('click', async () => {
          if (!deleteTargetId) return;
          els.confirmBtn.disabled = true;
          els.confirmBtn.textContent = 'جاري...';
          
          try {
            const reqSnap = await getD(docR(db, "survey_ismail_emad", deleteTargetId));
            const reqData = reqSnap.data();
            
            await delDoc(docR(db, "survey_ismail_emad", deleteTargetId));
            
            const updates = { totalSubmissions: inc(-1) };
            if (reqData && !reqData.read) updates.newSubmissions = inc(-1);
            if (reqData && reqData.submittedAt) {
              const d = reqData.submittedAt.toDate ? reqData.submittedAt.toDate() : new Date(reqData.submittedAt);
              if (d.toDateString() === new Date().toDateString()) updates.todaySubmissions = inc(-1);
            }
            await setD(STATS_DOC, updates, { merge: true });
            
            els.modal.classList.remove('active');
            deleteTargetId = null;
          } catch (err) {
            console.error(err);
            alert('خطأ في الحذف');
            els.confirmBtn.disabled = false;
            els.confirmBtn.textContent = 'حذف';
          }
        });

        document.addEventListener('keydown', (e) => {
          if (e.key === 'Escape' && els.modal.classList.contains('active')) {
            els.modal.classList.remove('active');
            deleteTargetId = null;
          }
        });

        // بدء
        loadStats();
      }
    })();
  </script>
</body>
</html>
